openapi: "3.0.3"
info:
  title: Learn-it — External API Integration
  version: "1.0"
  description: >
    Documents the external APIs consumed by the Learn-it Android app.
    Internal Room database is not an API — see LearnitDatabase.kt.

servers:
  - url: https://api.groq.com/openai/v1
    description: Groq inference API (OpenAI-compatible)

security:
  - bearerAuth: []

paths:
  /chat/completions:
    post:
      operationId: generateFlashcards
      summary: Generate flashcard Q&A pairs for a given topic
      description: >
        Called by FlashcardRepositoryImpl. The system prompt instructs the model
        to return a strict JSON array of {question, answer} objects.
        Response is parsed by GroqResponseParser, which strips markdown fences
        as a fallback.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroqRequest"
            example:
              model: llama-3.3-70b-versatile
              messages:
                - role: system
                  content: >
                    Kamu adalah generator flashcard. Berdasarkan topik yang diberikan user,
                    hasilkan 8-10 pasangan pertanyaan-jawaban dalam format JSON array murni:
                    [{"question": "...", "answer": "..."}]. Jangan tambahkan teks lain,
                    penjelasan, atau markdown code fence. Hanya JSON valid.
                - role: user
                  content: Fotosintesis
      responses:
        "200":
          description: Completion returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroqResponse"
              example:
                choices:
                  - finish_reason: stop
                    message:
                      role: assistant
                      content: >
                        [{"question":"Apa itu fotosintesis?","answer":"Proses tumbuhan mengubah cahaya matahari menjadi energi kimia"},
                         {"question":"Apa produk utama fotosintesis?","answer":"Glukosa dan oksigen"}]
        "400":
          description: Bad request (e.g. empty messages)
        "401":
          description: Invalid or missing API key
        "429":
          description: Rate limit exceeded
        "503":
          description: Model temporarily unavailable

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Groq API key. Set GROQ_API_KEY in .env at project root.
        Exposed to app via BuildConfig.GROQ_API_KEY at build time.

  schemas:
    GroqRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: Groq model ID
          example: llama-3.3-70b-versatile
        messages:
          type: array
          items:
            $ref: "#/components/schemas/GroqMessage"

    GroqMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string

    GroqResponse:
      type: object
      properties:
        choices:
          type: array
          items:
            $ref: "#/components/schemas/GroqChoice"

    GroqChoice:
      type: object
      properties:
        finish_reason:
          type: string
          example: stop
        message:
          $ref: "#/components/schemas/GroqMessage"

    FlashcardArray:
      description: >
        Shape expected inside choices[0].message.content after parsing.
        GroqResponseParser deserializes this from the model's text output.
      type: array
      items:
        type: object
        required: [question, answer]
        properties:
          question:
            type: string
          answer:
            type: string
